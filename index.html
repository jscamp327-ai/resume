<!DOCTYPE html>
<html>
<head>
  <style>
    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      backdrop-filter: blur(10px);
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .message {
      color: #fff;
      font-size: 28px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>
  <!-- 기존 이력서 내용 그대로 유지 -->

  <div class="overlay">
    <div class="message">🔒 비공개 페이지입니다.</div>
  </div>
</body>
</html>
